name: Build bluemira

inputs:
  python-version:
    required: true
  clone-bluemira:
    required: false
    default: "true"
  with-artifact:
    required: false
    default: "false"

runs:
  using: "composite"
  steps:

    - name: Checkout bluemira
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      if: inputs.clone-bluemira == 'true'
      with:
        repository: Fusion-Power-Plant-Framework/bluemira
        path: bluemira

    - name: Cache pip
      id: cache-pip
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ inputs.python-version }}-${{
          hashFiles('requirements/uv/all.txt', 'bluemira/requirements/uv/all.txt',
          'pyproject.toml', 'bluemira/pyproject.toml') }}

    - name: Cache conda
      id: cache-conda
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/conda_pkgs_dir
        key: ${{ runner.os }}-conda-${{ inputs.python-version }}-${{
          hashFiles('conda/environment.yml', 'bluemira/conda/environment.yml', 'requirements/conda.txt',
          'bluemira/requirements/conda.txt', 'pyproject.toml', 'bluemira/pyproject.toml') }}

    - name: Determine environment file path
      id: set-env
      shell: bash -l {0}
      run: |
        if [[ "${{ inputs.clone-bluemira }}" == "true" ]]; then
          echo "FILE_PATH=bluemira/conda/environment.yml" >> $GITHUB_OUTPUT
        else
          echo "FILE_PATH=conda/environment.yml" >> $GITHUB_OUTPUT
        fi

    - name: Install Environment
      uses: conda-incubator/setup-miniconda@fc2d68f6413eb2d87b895e92f8584b5b94a10167 # v3
      with:
        activate-environment: bluemira
        environment-file: ${{ steps.set-env.outputs.FILE_PATH }}
        miniforge-version: "latest"
        use-only-tar-bz2: false
        conda-remove-defaults: true
        python-version: ${{ inputs.python-version }}

    - name: Install bluemira
      shell: bash -l {0}
      run: |
        if [[ "${{ inputs.clone-bluemira }}" == "true" ]]; then
          pip install -U -e './bluemira[dagmc]' 
        else
          pip install -U -e '.[dagmc]' 
        fi

    - name: Freeze conda env
      if: inputs.with-artifact == 'true'
      shell: bash -l {0}
      run: |
        conda env export -n bluemira > bluemira_${{ inputs.python-version }}_${{ runner.os }}.yml

    - name: Upload environment artifact
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      if: inputs.with-artifact == 'true'
      with:
        name: bluemira_${{ inputs.python-version }}_${{ runner.os }}.yml
        path: bluemira_${{ inputs.python-version }}_${{ runner.os }}.yml
        overwrite: true

    - name: Save pip build cache
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      if: always() && steps.cache-pip.outputs.cache-hit != 'true' && inputs.with-artifact == 'true'
      with:
        path: ~/.cache/pip
        key: ${{ steps.cache-pip.outputs.cache-primary-key }}

    - name: Save conda build cache
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      if: always() && steps.cache-conda.outputs.cache-hit != 'true' && inputs.with-artifact == 'true'
      with:
        path: ~/conda_pkgs_dir
        key: ${{ steps.cache-conda.outputs.cache-primary-key }}