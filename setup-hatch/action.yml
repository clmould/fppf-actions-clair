name: setup-hatch

inputs:
  python-version:
    required: false
    default: ">=3.10 <3.14"

description: "Sets up Hatch for use in the current workflow"
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
      with:
        python-version: ${{ inputs.python-version }}
        cache: "pip"
    - name: Install build dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install "hatch>=1.16.5" "click!=8.3.0"
